# MkDocs configuration for ml4t-india.
#
# Built with Material for MkDocs + mkdocstrings so API reference is
# generated directly from docstrings in src/ml4t/india/. Other ml4t-*
# libraries use the same stack; keeping our config familiar lets
# readers move between sites without re-learning navigation.

site_name: ml4t-india
site_description: Algorithmic trading for Indian markets (NSE, BSE) on top of the ml4t-* ecosystem
site_url: https://shankarpandala.github.io/ml4t-india/
repo_url: https://github.com/shankarpandala/ml4t-india
repo_name: shankarpandala/ml4t-india
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API reference: api.md
  - Ecosystem: ecosystem.md
  - Phase-0 notes: phase-0.md
