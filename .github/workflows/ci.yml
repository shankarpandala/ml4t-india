name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Set once at workflow level so every step in every job sees it.
#
# The `_FOR_ML4T_INDIA` suffix is LOAD-BEARING. setuptools-scm supports two
# pretend-version env vars:
#
#   * SETUPTOOLS_SCM_PRETEND_VERSION             -- applied to EVERY
#     setuptools-scm invocation in the process tree. This bleeds into
#     transitive source-builds of any dep that happens to use
#     setuptools-scm (observed breaking shap 0.49.1's sdist build on
#     Python 3.14: pip thought shap was version 0.0.0.dev0 while the
#     wheel metadata said 0.49.1, and the resolver aborted).
#
#   * SETUPTOOLS_SCM_PRETEND_VERSION_FOR_<NORMALIZED_NAME>  -- scoped to
#     exactly one package. For `ml4t-india`, the normalized name is
#     `ML4T_INDIA` (uppercased, hyphens -> underscores).
#
# The second form is the one we want: our own package gets a deterministic
# tag-less version, transitive builds keep their own metadata.
env:
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ML4T_INDIA: "0.0.0.dev0"

jobs:
  test:
    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mainline (must-pass) GIL-enabled CPython versions.
        # 3.14 is NOT mainline yet: pydantic 2.13.3 (current latest, dated
        # 2026-04-20) crashes on 3.14.0rc2 with
        #   TypeError: _eval_type() got an unexpected keyword argument
        #   'prefer_fwd_module'
        # when ml4t-data imports a BaseModel with forward references.
        # This is an upstream ecosystem gap, not something we can fix here;
        # 3.14 lives in the experimental lane until pydantic / the wider
        # ecosystem catch up. When it goes green two runs in a row we
        # promote it back to mainline.
        python-version: ['3.12', '3.13']
        experimental: [false]
        include:
          - python-version: '3.14'
            experimental: true
          # Free-threaded CPython (PEP 703 / PEP 779). 3.13t is the first
          # officially released free-threaded build; 3.14t is its successor.
          # Experimental because upstream wheels for numpy / polars /
          # numba / pyarrow do not yet exist for free-threaded ABIs, so
          # the full `.[dev]` install fails at the C-extension build step.
          - python-version: '3.13t'
            experimental: true
          - python-version: '3.14t'
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # allow-prereleases covers the window between a new free-threaded
      # build being released and setup-python's stable listing of it.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show interpreter mode (GIL vs free-threaded)
        run: |
          python -c "import sys; print('python:', sys.version); print('GIL enabled:', getattr(sys, '_is_gil_enabled', lambda: True)())"

      # Full editable install with --pre so pip considers pre-release builds
      # of upstream ml4t-* packages (which currently publish only 0.1.0a*/b*
      # versions).
      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -ra

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deep history lets hatch-vcs see every tag that does exist. The
          # workflow-level SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ML4T_INDIA
          # env var handles the tag-less case (fresh clones and this repo
          # before its first release tag).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and universal wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
