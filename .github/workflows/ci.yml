name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        experimental: [false]
        include:
          # Free-threaded CPython (PEP 703 / PEP 779). Marked experimental:
          # upstream ml4t-* and some transitive C extensions may not have
          # no-GIL wheels yet. A failure here should not block merges, but
          # it WILL show up as a status so we track the progression.
          - python-version: '3.13t'
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # hatch-vcs reads tag history to derive the version when installing
          # `-e .`. Without fetch-depth: 0 we only get the PR head and the
          # fallback_version path kicks in -- that works but logs a warning.
          fetch-depth: 0

      # Caching is off until we commit a uv.lock (phase 8). setup-uv's
      # default cache key hashes **/uv.lock and errors out when absent.
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # allow-prereleases covers the window between a new free-threaded
      # build being released and setup-python's stable listing of it.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show interpreter mode (GIL vs free-threaded)
        run: |
          python -c "import sys; print('python:', sys.version); print('GIL enabled:', getattr(sys, '_is_gil_enabled', lambda: True)())"

      # `--prerelease=allow` is required while upstream ml4t-* packages
      # publish only pre-release builds; uv's default (`if-necessary`)
      # handles most of them but some transitive chains need the explicit
      # opt-in. The flag stays CI-side; the package specifiers in
      # pyproject.toml intentionally carry no version constraint on
      # ml4t-*.
      - name: Install project + dev extras
        run: |
          uv pip install --system --prerelease=allow -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -ra

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # hatch-vcs reads the tag history to derive the version.
          # fallback_version in pyproject.toml covers the tag-less case
          # (e.g. this PR before the first release tag).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: pip install build

      - name: Build sdist and universal wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
