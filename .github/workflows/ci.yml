name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        experimental: [false]
        include:
          # Free-threaded CPython (PEP 703 / PEP 779). Marked experimental:
          # upstream ml4t-* and some transitive C extensions may not have
          # no-GIL wheels yet. A failure here should not block merges, but
          # it WILL show up as a status so we track the progression.
          - python-version: '3.13t'
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Caching is off until we commit a uv.lock (phase 8). setup-uv's
      # default cache key hashes **/uv.lock and errors out when absent.
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # allow-prereleases covers the window between a new free-threaded
      # build being released and setup-python's stable listing of it.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show interpreter mode (GIL vs free-threaded)
        run: |
          python -c "import sys; print('python:', sys.version); print('GIL enabled:', getattr(sys, '_is_gil_enabled', lambda: True)())"

      # -------------------------------------------------------------------
      # Phase-0 shortcut: install only the tools this phase actually uses.
      #
      # We deliberately do NOT install `-e '.[dev]'` here because Phase-0
      # ships zero code that imports from upstream ml4t-* packages; the
      # only test is `test_placeholder.py` which uses the stdlib alone.
      # Resolving the full dependency tree right now would exercise
      # transitive pre-release constraints in ml4t-data / ml4t-specs /
      # ml4t-live that are orthogonal to this step's scope.
      #
      # TODO(Phase 0.4): once IndianOHLCVProvider(BaseProvider) lands and
      # starts importing from ml4t.data.providers.base, switch this back
      # to `uv pip install --system -e '.[dev]'` and diagnose any
      # remaining resolution issue with full local logs.
      # -------------------------------------------------------------------
      - name: Install lint + test tools (Phase-0 subset)
        run: |
          uv pip install --system pytest ruff

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -ra

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # hatch-vcs reads the tag history to derive the version.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: pip install build

      - name: Build sdist and universal wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
