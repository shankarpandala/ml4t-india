name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Set once at workflow level so every step in every job sees it. Any hatchling
# / hatch-vcs / setuptools-scm invocation bypasses VCS inspection and uses
# this version. When we tag a real release we remove this env var; setuptools-scm
# then derives the version from the tag automatically.
env:
  SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0.dev0"

jobs:
  test:
    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mainline (must-pass) GIL-enabled CPython versions.
        python-version: ['3.12', '3.13', '3.14']
        experimental: [false]
        include:
          # Free-threaded CPython (PEP 703 / PEP 779). 3.13t is the first
          # officially released free-threaded build; 3.14t is its successor.
          # Both are marked experimental: upstream wheels for numpy / polars
          # / pyarrow may not yet exist for free-threaded ABIs, so the full
          # `.[dev]` install may fall over on these lanes. Failures do not
          # block merges; the status stays visible so we can track when the
          # ecosystem is ready.
          - python-version: '3.13t'
            experimental: true
          - python-version: '3.14t'
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # allow-prereleases covers the window between a new free-threaded
      # build being released and setup-python's stable listing of it.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Show interpreter mode (GIL vs free-threaded)
        run: |
          python -c "import sys; print('python:', sys.version); print('GIL enabled:', getattr(sys, '_is_gil_enabled', lambda: True)())"

      # Full editable install with --pre so pip considers pre-release builds
      # of upstream ml4t-* packages (which currently publish only 0.1.0a*/b*
      # versions).
      - name: Install project + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -ra

  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deep history lets hatch-vcs see every tag that does exist. The
          # workflow-level SETUPTOOLS_SCM_PRETEND_VERSION env var handles
          # the tag-less case (fresh clones and this repo before its first
          # release tag).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and universal wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
